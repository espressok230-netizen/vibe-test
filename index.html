<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음의 감정 카드 ✨ 신비로운 감정 탐험</title>
  <style>
    :root {
      --bg-1: #0b0722;
      --bg-2: #1a0f3d;
      --bg-3: #2b1d5e;
      --gold: #ffd98a;
      --glow: #a78bfa;
      --ink: #f3ecff;
      --muted: #c8bff0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 15% -10%, rgba(167,139,250,0.30), transparent 60%),
        radial-gradient(900px 600px at 110% 10%, rgba(255,131,166,0.22), transparent 55%),
        radial-gradient(1000px 800px at 50% 120%, rgba(56,189,248,0.20), transparent 60%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* twinkling starfield */
    #stars, #stars2, #stars3 {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .twinkle {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0.8;
      animation: blink var(--dur) ease-in-out infinite alternate;
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }
    @keyframes blink { from { opacity: 0.15; transform: scale(0.7);} to { opacity: 1; transform: scale(1.15);} }

    /* floating magical particles */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(1px);
      pointer-events: none;
      z-index: 0;
      animation: float linear infinite;
      opacity: 0.55;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0.6); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-12vh) scale(1.1); opacity: 0; }
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: min(100%, 1200px);
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header { text-align: center; margin-bottom: 10px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--gold);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,217,138,0.35);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 24px rgba(167,139,250,0.25);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(30px, 6vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(90deg, #ffe7a8, #ff9ecb, #a78bfa, #7dd3fc, #ffe7a8);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(167,139,250,0.35);
      animation: shimmer 8s linear infinite;
    }
    @keyframes shimmer { to { background-position: 300% 50%; } }

    .subtitle {
      color: var(--muted);
      font-size: clamp(14px, 2.4vw, 18px);
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 26px 0 8px;
    }
    .btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      padding: 12px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(167,139,250,0.35); background: rgba(255,255,255,0.14); }
    .btn:active { transform: translateY(0) scale(.97); }
    .btn.primary {
      background: linear-gradient(135deg, #a78bfa, #ff9ecb);
      border-color: transparent;
      color: #1b1145;
      box-shadow: 0 10px 30px rgba(167,139,250,0.45);
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      opacity: 0.85;
    }

    .grid {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 26px;
    }

    /* card */
    .scene {
      perspective: 1200px;
      aspect-ratio: 3 / 4.2;
      cursor: pointer;
      opacity: 0;
      transform: translateY(24px);
      animation: rise .7s ease forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .8s cubic-bezier(.2,.85,.3,1.15);
      will-change: transform;
    }
    .scene.flipped .card { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow:
        0 18px 40px rgba(5,2,20,0.55),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    /* shining sweep */
    .face::after {
      content: "";
      position: absolute;
      top: -60%;
      left: -30%;
      width: 60%;
      height: 220%;
      background: linear-gradient(115deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: rotate(12deg);
      transition: left .6s ease;
      pointer-events: none;
    }
    .scene:hover .face::after { left: 120%; }

    .front {
      background:
        radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,0.18), transparent 55%),
        linear-gradient(160deg, var(--c1), var(--c2));
    }

    .rune {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 2px;
    }
    .rune.left { left: 14px; right: auto; }

    .emoji {
      font-size: clamp(56px, 12vw, 82px);
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
      animation: bob 3.5s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-8px);} }

    .name {
      margin-top: 16px;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
      letter-spacing: 1px;
    }
    .name-en {
      margin-top: 4px;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    .tap {
      position: absolute;
      bottom: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.18);
      padding: 4px 12px;
      border-radius: 999px;
    }

    .back {
      transform: rotateY(180deg);
      background:
        radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,0.14), transparent 55%),
        linear-gradient(160deg, #241850, #120a33);
      color: var(--ink);
    }
    .back .emoji-sm { font-size: 40px; }
    .back h3 {
      margin: 10px 0 12px;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
    }
    .desc {
      font-size: 15px;
      line-height: 1.7;
      color: #e9e2ff;
    }
    .flip-back {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 14px;
      border-radius: 999px;
    }

    footer {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      opacity: 0.8;
    }

    @media (prefers-reduced-motion: reduce) {
      .emoji, h1, .twinkle, .orb { animation: none; }
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>

  <main class="wrap">
    <header>
      <span class="badge">✦ 마음 탐험대 ✦</span>
      <h1>신비로운 감정 카드</h1>
      <p class="subtitle">카드를 살짝 눌러 뒤집어 보세요. 우리 마음속에 숨어 있는 감정들이 하나씩 깨어난답니다. 🌙</p>
      <div class="toolbar">
        <button class="btn primary" id="shuffle">🔮 카드 섞기</button>
        <button class="btn" id="flipAll">✨ 모두 뒤집기</button>
        <button class="btn" id="resetAll">↺ 앞면 보기</button>
      </div>
      <p class="hint">💡 카드를 클릭하면 3D로 뒤집혀 감정 설명이 나타나요.</p>
    </header>

    <section class="grid" id="grid" aria-label="감정 카드 목록"></section>

    <footer>🌟 초등 상담 수업을 위한 감정 카드 · 마음을 이해하는 첫걸음 🌟</footer>
  </main>

  <script>
    const EMOTIONS = [
      { name: "기쁨",   en: "Joy",       emoji: "😊", c1: "#ffb347", c2: "#ff7eb3", desc: "마음이 환하게 밝아지고 저절로 웃음이 나는 즐거운 느낌이에요. 좋은 일이 생겼을 때 우리를 찾아온답니다." },
      { name: "슬픔",   en: "Sadness",   emoji: "😢", c1: "#5aa9ff", c2: "#3d5af1", desc: "가슴이 먹먹하고 눈물이 날 것 같은 느낌이에요. 힘들 땐 마음껏 울어도 괜찮아요." },
      { name: "화남",   en: "Anger",     emoji: "😠", c1: "#ff6a6a", c2: "#d81159", desc: "속에서 뜨거운 것이 확 올라오는 느낌이에요. 화가 날 땐 천천히 숨을 크게 쉬어 보아요." },
      { name: "두려움", en: "Fear",      emoji: "😨", c1: "#7b8cff", c2: "#4b3f9e", desc: "무섭고 몸이 움츠러드는 느낌이에요. 곁에 있는 사람에게 도움을 청해도 좋아요." },
      { name: "사랑",   en: "Love",      emoji: "🥰", c1: "#ff8fb1", c2: "#ff5e78", desc: "누군가를 아끼고 따뜻하게 감싸주고 싶은 마음이에요. 마음이 몽글몽글 따뜻해져요." },
      { name: "놀람",   en: "Surprise",  emoji: "😲", c1: "#ffd36e", c2: "#ff9a3c", desc: "예상하지 못한 일에 눈이 커지고 심장이 쿵! 하는 느낌이에요." },
      { name: "부끄러움", en: "Shyness", emoji: "😳", c1: "#ffa8c5", c2: "#f76b8a", desc: "얼굴이 발그레해지고 어딘가 숨고 싶어지는 느낌이에요. 누구나 느낄 수 있는 마음이랍니다." },
      { name: "설렘",   en: "Excitement",emoji: "✨", c1: "#a18cd1", c2: "#fbc2eb", desc: "곧 좋은 일이 생길 것 같아 마음이 두근두근 뛰는 느낌이에요." },
      { name: "외로움", en: "Loneliness",emoji: "😔", c1: "#6d83a3", c2: "#37476b", desc: "혼자인 것 같아 마음이 쓸쓸한 느낌이에요. 친구에게 먼저 다가가 보아요." },
      { name: "고마움", en: "Gratitude", emoji: "🙏", c1: "#7ee8a5", c2: "#2fb28a", desc: "누군가의 도움에 마음이 따뜻해지는 느낌이에요. '고마워'라고 말해 보아요." },
      { name: "뿌듯함", en: "Pride",     emoji: "😌", c1: "#ffcf7a", c2: "#f79d3c", desc: "내가 해냈다는 생각에 가슴이 벅차오르는 느낌이에요. 스스로를 칭찬해 주어요." },
      { name: "질투",   en: "Jealousy",  emoji: "😤", c1: "#8ed081", c2: "#3a8a4d", desc: "다른 사람이 부러워서 마음이 콕콕 아려오는 느낌이에요. 아주 자연스러운 감정이랍니다." },
      { name: "평온",   en: "Calm",      emoji: "😇", c1: "#9be7ff", c2: "#5bc0eb", desc: "마음이 잔잔하고 편안한 느낌이에요. 깊게 숨을 쉬면 더욱 편안해져요." },
      { name: "걱정",   en: "Worry",     emoji: "😟", c1: "#b3a4e0", c2: "#6c5ab0", desc: "어떤 일이 잘못될까 봐 마음이 무거운 느낌이에요. 믿는 어른에게 이야기해 보아요." },
      { name: "신남",   en: "Thrill",    emoji: "🤩", c1: "#ffe66d", c2: "#ff9f1c", desc: "재미있고 기운이 넘쳐서 폴짝폴짝 뛰고 싶은 신나는 느낌이에요." },
      { name: "미안함", en: "Sorry",     emoji: "🥺", c1: "#ffb6b9", c2: "#d16ba5", desc: "내 잘못으로 상대가 속상했을까 봐 마음이 무거운 느낌이에요. 용기 내어 '미안해'라고 말해요." },
    ];

    const grid = document.getElementById("grid");

    function render(list) {
      grid.innerHTML = "";
      list.forEach((e, i) => {
        const scene = document.createElement("div");
        scene.className = "scene";
        scene.style.animationDelay = (i * 60) + "ms";
        scene.setAttribute("role", "button");
        scene.setAttribute("tabindex", "0");
        scene.setAttribute("aria-label", e.name + " 감정 카드");
        scene.innerHTML = `
          <div class="card" style="--c1:${e.c1}; --c2:${e.c2};">
            <div class="face front">
              <span class="rune left">✦</span><span class="rune">✦</span>
              <div class="emoji">${e.emoji}</div>
              <div class="name">${e.name}</div>
              <div class="name-en">${e.en}</div>
              <div class="tap">👆 눌러서 뒤집기</div>
            </div>
            <div class="face back">
              <div class="emoji-sm">${e.emoji}</div>
              <h3>${e.name}</h3>
              <p class="desc">${e.desc}</p>
              <div class="flip-back">↩ 다시 앞면 보기</div>
            </div>
          </div>`;
        const cardEl = scene.querySelector(".card");
        const flip = () => {
          scene.classList.toggle("flipped");
          // clear any inline tilt transform so the .flipped CSS rule can take over
          cardEl.style.transform = "";
        };
        scene.addEventListener("click", flip);
        scene.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); flip(); }
        });
        addTilt(scene);
        grid.appendChild(scene);
      });
    }

    // subtle 3D tilt following the pointer (kept small so flip stays clean)
    function addTilt(scene) {
      const card = scene.querySelector(".card");
      scene.addEventListener("mousemove", (ev) => {
        if (scene.classList.contains("flipped")) return;
        const r = scene.getBoundingClientRect();
        const px = (ev.clientX - r.left) / r.width - 0.5;
        const py = (ev.clientY - r.top) / r.height - 0.5;
        card.style.transform = `rotateY(${px * 14}deg) rotateX(${ -py * 14}deg)`;
      });
      scene.addEventListener("mouseleave", () => {
        if (!scene.classList.contains("flipped")) card.style.transform = "";
      });
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setFlipped(state) {
      document.querySelectorAll(".scene").forEach(s => {
        s.classList.toggle("flipped", state);
        // clear inline tilt transform so the .flipped CSS rule always applies
        s.querySelector(".card").style.transform = "";
      });
    }

    document.getElementById("shuffle").addEventListener("click", () => render(shuffle(EMOTIONS)));
    document.getElementById("flipAll").addEventListener("click", () => setFlipped(true));
    document.getElementById("resetAll").addEventListener("click", () => setFlipped(false));

    render(EMOTIONS);

    // ---------- background: stars + floating orbs ----------
    function makeStars(layerId, count, sizeMax, durBase) {
      const layer = document.getElementById(layerId);
      let html = "";
      for (let i = 0; i < count; i++) {
        const size = (Math.random() * sizeMax + 0.6).toFixed(1);
        const top = (Math.random() * 100).toFixed(2);
        const left = (Math.random() * 100).toFixed(2);
        const dur = (durBase + Math.random() * 2.5).toFixed(2);
        html += `<span class="twinkle" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;--dur:${dur}s;animation-delay:${(Math.random()*3).toFixed(2)}s"></span>`;
      }
      layer.innerHTML = html;
    }
    makeStars("stars", 70, 2.2, 1.6);
    makeStars("stars2", 45, 1.6, 2.4);
    makeStars("stars3", 25, 3.0, 3.2);

    const orbColors = ["#a78bfa", "#ff9ecb", "#7dd3fc", "#ffe7a8", "#8ed081"];
    for (let i = 0; i < 14; i++) {
      const orb = document.createElement("span");
      orb.className = "orb";
      const size = Math.random() * 22 + 8;
      orb.style.width = size + "px";
      orb.style.height = size + "px";
      orb.style.left = (Math.random() * 100).toFixed(2) + "%";
      orb.style.background = orbColors[i % orbColors.length];
      orb.style.animationDuration = (Math.random() * 14 + 12).toFixed(1) + "s";
      orb.style.animationDelay = (Math.random() * 12).toFixed(1) + "s";
      orb.style.boxShadow = "0 0 18px " + orb.style.background;
      document.body.appendChild(orb);
    }
  </script>
</body>
</html>
